name: Bug Report
description: Report a reproducible SDK bug
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue.
        Do not include API keys, tokens, PAN, CVV, or sensitive customer data.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Short description of the issue
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce
      placeholder: |
        1. Configure profile ...
        2. Build payload ...
        3. Submit request ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: sdk-version
    attributes:
      label: SDK Version
      placeholder: 3.0.0
    validations:
      required: true

  - type: input
    id: php-version
    attributes:
      label: PHP Version
      placeholder: 8.3
    validations:
      required: true

  - type: input
    id: integration-mode
    attributes:
      label: Integration Mode
      description: e.g. Hosted Page, Own Form, Callback, Browser Return

  - type: textarea
    id: logs
    attributes:
      label: Logs / Error Output (Sanitized)
      description: Remove all sensitive values before posting
